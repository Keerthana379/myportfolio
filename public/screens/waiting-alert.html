<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Waiting Alert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .status-bar {
            height: 44px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }
        .time { font-weight: 600; }
        .indicators { display: flex; gap: 5px; }
        .map-area {
            height: 100%;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .map-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, transparent 1px, transparent 20px),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.02) 0px, transparent 1px, transparent 20px);
        }
        .driver-marker {
            position: absolute;
            top: 300px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: #FFD500;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(255, 213, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .pulse-ring {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 3px solid #FFD500;
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        .driver-card {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .driver-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #FFD500;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 24px;
            font-weight: 700;
        }
        .driver-info {
            flex: 1;
        }
        .driver-name {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 2px;
        }
        .driver-details {
            font-size: 12px;
            color: #6b7280;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
            color: #f59e0b;
        }
        .call-button {
            width: 40px;
            height: 40px;
            background: #FFD500;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255, 213, 0, 0.3);
        }
        .alert-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .alert-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .alert-icon {
            font-size: 32px;
        }
        .alert-title {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
        }
        .timer-display {
            text-align: center;
            margin: 20px 0;
        }
        .timer-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .timer-value {
            font-size: 48px;
            font-weight: 700;
            color: #FFD500;
            font-variant-numeric: tabular-nums;
        }
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }
        .progress-fill {
            height: 100%;
            background: #FFD500;
            width: 62.5%;
            transition: width 0.3s ease;
        }
        .free-time-text {
            font-size: 13px;
            color: #000;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
        }
        .warning-box {
            background: #fef3c7;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
        }
        .warning-icon {
            font-size: 20px;
        }
        .warning-text {
            font-size: 13px;
            color: #92400e;
            font-weight: 500;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #FFD500;
            color: #000;
            box-shadow: 0 4px 12px rgba(255, 213, 0, 0.3);
        }
        .btn-secondary {
            background: #fff;
            color: #000;
            border: 2px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="time">9:41</div>
            <div class="indicators">📶 📡 🔋</div>
        </div>
        
        <div class="map-area">
            <div class="map-pattern"></div>
            <div class="driver-marker">
                <div class="pulse-ring"></div>
                🏍️
            </div>
        </div>
        
        <div class="driver-card">
            <div class="driver-photo">RK</div>
            <div class="driver-info">
                <div class="driver-name">Rajesh Kumar</div>
                <div class="driver-details">KA-01-AB-1234 • Bike</div>
                <div class="rating">⭐ 4.8</div>
            </div>
            <div class="call-button">📞</div>
        </div>
        
        <div class="alert-card">
            <div class="alert-header">
                <div class="alert-icon">🏍️</div>
                <div class="alert-title">Driver Arrived!</div>
            </div>
            
            <div class="timer-display">
                <div class="timer-label">Waiting Time</div>
                <div class="timer-value">00:45</div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <div class="free-time-text">
                Free time remaining: 1 min 15 sec
            </div>
            
            <div class="warning-box">
                <div class="warning-icon">⚠️</div>
                <div class="warning-text">
                    Charges start at ₹1/min after 2:00
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary">I'm Coming</button>
                <button class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
